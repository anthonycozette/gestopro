security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        accountant_provider:
            entity:
                class: App\Entity\Accountant
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            entry_point: jwt
            provider: app_user_provider
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            jwt: ~
            refresh_jwt:
                check_path: api_token_refresh

        expert:
            pattern: ^/expert(/|$)
            context: expert
            lazy: true
            provider: accountant_provider
            form_login:
                login_path: expert_login
                check_path: expert_login
                username_parameter: email
                password_parameter: password
                default_target_path: expert_dashboard
                enable_csrf: true
            logout:
                path: expert_logout
                target: expert_login

        main:
            context: main
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                default_target_path: /dashboard
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/expert/login, roles: PUBLIC_ACCESS }
        - { path: ^/expert/register, roles: PUBLIC_ACCESS }
        - { path: ^/expert(/|$), roles: ROLE_ACCOUNTANT }
        - { path: ^/stripe/webhook, roles: PUBLIC_ACCESS }
        - { path: ^/pricing, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
